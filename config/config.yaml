# Assembly workflow configuration template.
#
# Do NOT edit this file with real paths and commit it back — keep it as the
# schema-correct skeleton. Generate a real config via:
#
#   python3 setup_workflow.py --samplesheet config/samples.tsv \
#                             --chm13 <PATH> --grch38 <PATH> ... \
#                             --images-dir images \
#                             --output config/<your>.yaml
#
# Empty path strings are placeholders. Resource defaults mirror those in
# setup_workflow.py and may be tuned per HPC.
samples: config/samples.tsv.template
output:
  base: ../output
