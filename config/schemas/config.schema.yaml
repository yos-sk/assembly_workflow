$schema: "https://json-schema.org/draft/2020-12/schema"
description: Schema for config.yaml

type: object

properties:
  samples:
    type: string
    description: Path to sample sheet TSV file

  output:
    type: object
    properties:
      base:
        type: string
        description: Base output directory
    required:
      - base

  references:
    type: object
    properties:
      chm13:
        type: string
        description: Path to CHM13 reference genome
      grch38:
        type: string
        description: Path to GRCh38 reference genome
      chm13_satellite:
        type: string
        description: Path to CHM13 CenSat annotation BED file
      grch38_centromeres:
        type: string
        description: Path to GRCh38 centromeres file
      grch38_exclusions:
        type: string
        description: Path to GRCh38 exclusion regions BED file
      grch38_gtf:
        type: string
        description: Path to GRCh38 GTF annotation file
    required:
      - chm13
      - grch38

  tools:
    type: object
    description: Paths to tool resources
    properties:
      compleasm_library:
        type: string
        description: Path to compleasm library directory
    required:
      - compleasm_library

  images:
    type: object
    description: Paths to singularity images
    properties:
      alignment:
        type: string
      hifiasm:
        type: string
      verkko:
        type: string
      filter_assembly:
        type: string
      trf_mod:
        type: string
      dna_nn:
        type: string
      liftoff:
        type: string
      repeatmasker:
        type: string
      sedef:
        type: string
      chain_files:
        type: string
      censat_tools:
        type: string
      censat_alphasat:
        type: string
      censat_hmmer:
        type: string
      censat_hsat:
        type: string
      censat_rm2bed:
        type: string
      flagger:
        type: string
      inspector:
        type: string
      nucflag:
        type: string
      merqury:
        type: string
      mashmap:
        type: string
      compleasm:
        type: string
      pstools:
        type: string
      yak:
        type: string

  resources:
    type: object
    description: Resource allocation for each rule (cpus, mem_per_cpu)
    patternProperties:
      ".*":
        type: object
        properties:
          cpus:
            type: integer
            minimum: 1
            description: Number of CPU cores
          mem_per_cpu:
            type: string
            pattern: "^[0-9]+(G|M)$"
            description: Memory per CPU (e.g., '8G', '512M')

  params:
    type: object
    description: Parameters for specific rules
    properties:
      trf_mod:
        type: object
        properties:
          match:
            type: integer
          mismatch:
            type: integer
          delta:
            type: integer
          pm:
            type: integer
          pi:
            type: integer
          minscore:
            type: integer
          maxperiod:
            type: integer
          minlength:
            type: integer

required:
  - samples
  - references
  - tools
  - images
  - output
  - resources
